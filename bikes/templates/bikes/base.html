<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Royal Enfield{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        :root {
            --bg-dark: #050505;
            --bg-card: #0f0f0f;
            --text-main: #ffffff;
            --text-muted: #888888;
            --primary: #d30000;
            --primary-glow: rgba(211, 0, 0, 0.4);
            --accent: #d4af37;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        h1, h2, h3, .logo {
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        ::selection {
            background: var(--primary);
            color: white;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Navbar */
        nav {
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1.2rem 5%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.4s ease;
        }

        nav.scrolled {
            padding: 0.8rem 5%;
            background: rgba(0, 0, 0, 0.95);
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--text-main);
            text-decoration: none;
        }
        
        .logo span {
            color: var(--primary);
            text-shadow: 0 0 15px var(--primary-glow);
        }

        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            margin-left: 2.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        /* Hero Parallax */
        .hero-section {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 120%;
            object-fit: cover;
            opacity: 0.3;
            z-index: 1;
            filter: grayscale(1);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        /* Main Content */
        main {
            padding-top: 80px;
        }

        /* Premium Buttons */
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 0;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            text-decoration: none;
            display: inline-block;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--primary);
        }

        .btn:hover {
            background: transparent;
            color: var(--primary);
            box-shadow: 0 0 30px var(--primary-glow);
        }

        /* Glass Cards */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 2rem;
            transition: all 0.4s ease;
        }

        .glass-card:hover {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.05);
        }

        /* Premium Filters */
        .custom-filter {
            position: relative;
            display: inline-block;
        }

        .custom-filter select {
            appearance: none;
            background: var(--bg-card);
            color: white;
            border: 1px solid var(--glass-border);
            padding: 1rem 3rem 1rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
        }

        .custom-filter select:hover, .custom-filter select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .custom-filter::after {
            content: '▼';
            position: absolute;
            right: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.7rem;
            color: var(--primary);
            pointer-events: none;
        }

        option {
            background: var(--bg-card);
            color: white;
            padding: 1rem;
        }

        option:hover, option:focus, option:checked {
            background: var(--primary) !important;
            color: white;
        }
        /* Navbar Filters */
        .nav-filters {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-filters .custom-filter {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 0.5rem 1rem;
            border-radius: 4px;
        }

        .nav-filters .custom-filter select {
            font-size: 0.75rem;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.7);
        }

        .nav-filters .custom-filter::after {
            right: 0.5rem;
            font-size: 0.6rem;
        }

        @media (max-width: 1024px) {
            .nav-filters {
                display: none; /* Hide on mobile to keep navbar clean */
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'bike_list' %}" class="logo">
            <img src="/static/image/logo_premium.jpg" alt="Royal Enfield" style="height: 40px; width: auto; display: block;">
        </a>
        
        <div style="display: flex; gap: 3rem; align-items: center;">
            <div class="nav-links">
                <a href="{% url 'bike_list' %}">Explore Models</a>
            </div>

            <div class="nav-filters">
                {% block navbar_filters %}{% endblock %}
            </div>
        </div>
    </nav>
    
    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 Royal Enfield Custom Bookings. Built for AWS Practical Session.</p>
    </footer>
</body>
</html>
